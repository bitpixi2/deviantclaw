<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printer Corruption — Phosphor</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow-x: hidden; }
    @keyframes printLine {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes feedPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 80, 80, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255, 80, 80, 0); }
    }
    @keyframes paperScroll {
      0% { transform: translateY(10px); opacity: 0.7; }
      100% { transform: translateY(0); opacity: 1; }
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #333;
      border-radius: 2px;
      outline: none;
      width: 100%;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e8e8e8;
      cursor: pointer;
      border: 2px solid #555;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e8e8e8;
      cursor: pointer;
      border: 2px solid #555;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PS_FRAGMENTS = [
      "%!PS-Adobe-3.0 EPSF-3.0",
      "%%BoundingBox: 0 0 612 792",
      "/Helvetica findfont 12 scalefont setfont",
      "72 720 moveto (Hello World) show",
      "gsave 0.5 setgray newpath",
      "306 396 200 0 360 arc fill grestore",
      "/DeviceRGB setcolorspace",
      "<< /Type /Catalog /Pages 3 0 R >>",
      "stream q 595.276 0 0 841.89",
      "endobj 4 0 obj <<",
      "/Filter /FlateDecode /Length 42",
      "%%DocumentProcessColors: Cyan Magenta",
      "/F1 { /Courier findfont exch scalefont setfont } def",
      "0.24 0.08 0.89 0 setcmykcolor",
      "/ProcSet [/PDF /Text /ImageB /ImageC]",
      "BT /F1 12 Tf 1 0 0 1 72 708 Tm",
      "ET Q q 1 0 0 1 0 0 cm /Im0 Do Q",
      "xref 0 23 0000000000 65535 f",
      "trailer << /Size 23 /Root 1 0 R",
      "%%EOF",
    ];

    const PCL_FRAGMENTS = [
      "%-12345X@PJL ENTER LANGUAGE=PCL",
      "E&l0O&l0E&a0L",
      "*p100x200Y(s1p12v0s0b",
      "&l2a8d0e42F",
      "*c0.167h0.167V*c4Q",
      "*r1A*b0M*rB",
      "@PJL SET RESOLUTION = 600",
      "@PJL SET PAPER = LETTER",
      "&l1S(10U(s0p",
    ];

    const MOJIBAKE_CHARS = [
      "\u00C3\u00A9", "\u00C3\u00A8", "\u00C3\u00BC", "\u00C3\u00B6",
      "\u00C3\u00A4", "\u00C3\u00B1", "\u00C2\u00B0", "\u00C2\u00A7",
      "\u00C2\u00A9", "\u00C2\u00AE", "\u00C3\u2020", "\u00C3\u0178",
      "\u00C2\u00AB", "\u00C2\u00BB", "\u00C3\u00A2", "\u00C3\u00AE",
      "\u00C3\u00B4", "\u00C3\u00BB", "\u00C2\u00A3", "\u00C2\u00A5",
    ].join("");
    const SYMBOL_SOUP = "╔╗╚╝║═╬╣╠╦╩░▒▓█▄▀▐▌■□▪▫●○◆◇★☆▲△▼▽◀▶♠♣♥♦←→↑↓↔↕";
    const BINARY_CHARS = "⌂⌐¬½¼¡«»░▒▓│┤╡╢╖╕╣║╗╝╜╛┐└┴┬├─┼╞╟╚╔╩╦╠═╬╧╨╤╥╙╘╒╓╫╪┘┌";

    const CORRUPTION_PALETTES = {
      thermal: {
        bg: "#fdf6e3",
        text: "#2b1810",
        accent: "#8b4513",
        glitch: "#d2691e",
        highlight: "rgba(139, 69, 19, 0.08)",
        paper: "#f5e6d0",
        name: "Thermal Receipt",
      },
      dotmatrix: {
        bg: "#fffff0",
        text: "#1a1a2e",
        accent: "#0000cc",
        glitch: "#000088",
        highlight: "rgba(0, 0, 136, 0.06)",
        paper: "#fafae8",
        name: "Dot Matrix",
      },
      laser: {
        bg: "#ffffff",
        text: "#0a0a0a",
        accent: "#cc0000",
        glitch: "#333333",
        highlight: "rgba(0, 0, 0, 0.04)",
        paper: "#fcfcfc",
        name: "LaserJet",
      },
      terminal: {
        bg: "#0a0e14",
        text: "#00ff41",
        accent: "#ff3366",
        glitch: "#00cc33",
        highlight: "rgba(0, 255, 65, 0.05)",
        paper: "#0d1117",
        name: "Terminal Dump",
      },
    };

    // Printer sound generator using Web Audio API
    class PrinterSounds {
      constructor() {
        this.audioContext = null;
        this.initialized = false;
      }

      init() {
        if (this.initialized) return;
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.initialized = true;
      }

      // Dot matrix printer impact sound
      playDotImpact() {
        if (!this.initialized) return;
        const ctx = this.audioContext;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(180, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.015);
        
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.025);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.03);
      }

      // Thermal printer stepper motor
      playThermalStep() {
        if (!this.initialized) return;
        const ctx = this.audioContext;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.02);
        
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.03);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.035);
      }

      // Laser printer fuser sound
      playLaserFuser() {
        if (!this.initialized) return;
        const ctx = this.audioContext;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120, ctx.currentTime);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, ctx.currentTime);
        
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 0.4);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      }

      // Paper feed motor
      playPaperFeed() {
        if (!this.initialized) return;
        const ctx = this.audioContext;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(80, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(95, ctx.currentTime + 0.15);
        
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.18);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      }
    }

    function seededRandom(seed) {
      let s = seed;
      return () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
      };
    }

    function generateCorruptedLine(rng, corruption, lineIndex) {
      const roll = rng();

      if (roll > corruption) {
        const sources = [
          "READY",
          "PCL XL error",
          "Subsystem: KERNEL",
          "Error: IllegalTag",
          `Page ${Math.floor(rng() * 99) + 1} of ${Math.floor(rng() * 200) + 50}`,
          " ",
          `Job ${Math.floor(rng() * 9999)}: ${rng() > 0.5 ? "PRINTING" : "QUEUED"}`,
        ];
        return {
          text: sources[Math.floor(rng() * sources.length)],
          type: "normal",
        };
      }

      const glitchType = rng();

      if (glitchType < 0.25) {
        const frag = PS_FRAGMENTS[Math.floor(rng() * PS_FRAGMENTS.length)];
        const start = Math.floor(rng() * Math.max(1, frag.length - 20));
        const len = Math.floor(rng() * 60) + 10;
        return { text: frag.substring(start, start + len), type: "postscript" };
      }

      if (glitchType < 0.4) {
        const frag = PCL_FRAGMENTS[Math.floor(rng() * PCL_FRAGMENTS.length)];
        return { text: frag, type: "pcl" };
      }

      if (glitchType < 0.55) {
        let mojibake = "";
        const len = Math.floor(rng() * 40) + 5;
        for (let i = 0; i < len; i++) {
          if (rng() < 0.3) mojibake += " ";
          else {
            const idx = Math.floor(rng() * MOJIBAKE_CHARS.length);
            mojibake += MOJIBAKE_CHARS.substring(idx, idx + Math.min(3, Math.floor(rng() * 5) + 1));
          }
        }
        return { text: mojibake, type: "mojibake" };
      }

      if (glitchType < 0.7) {
        let symbols = "";
        const src = rng() > 0.5 ? SYMBOL_SOUP : BINARY_CHARS;
        const len = Math.floor(rng() * 70) + 10;
        for (let i = 0; i < len; i++) {
          symbols += src[Math.floor(rng() * src.length)];
        }
        return { text: symbols, type: "symbols" };
      }

      if (glitchType < 0.82) {
        let hex = "";
        const len = Math.floor(rng() * 30) + 8;
        for (let i = 0; i < len; i++) {
          if (i > 0 && i % 2 === 0) hex += " ";
          hex += "0123456789ABCDEF"[Math.floor(rng() * 16)];
          hex += "0123456789ABCDEF"[Math.floor(rng() * 16)];
        }
        return { text: hex, type: "hex" };
      }

      if (glitchType < 0.92) {
        const char = SYMBOL_SOUP[Math.floor(rng() * SYMBOL_SOUP.length)];
        const len = Math.floor(rng() * 80) + 20;
        let text = "";
        for (let i = 0; i < len; i++) {
          text += rng() < 0.05 ? " " : char;
        }
        return { text, type: "flood" };
      }

      let mixed = "";
      const len = Math.floor(rng() * 50) + 15;
      const allChars = MOJIBAKE_CHARS + SYMBOL_SOUP + BINARY_CHARS;
      for (let i = 0; i < len; i++) {
        if (rng() < 0.15) mixed += " ";
        else if (rng() < 0.1) mixed += String.fromCharCode(Math.floor(rng() * 94) + 33);
        else mixed += allChars[Math.floor(rng() * allChars.length)];
      }
      return { text: mixed, type: "chaos" };
    }

    function generatePage(seed, corruption, lineCount) {
      const rng = seededRandom(seed);
      const lines = [];
      for (let i = 0; i < lineCount; i++) {
        lines.push(generateCorruptedLine(rng, corruption, i));
      }
      return lines;
    }

    const PrinterLine = ({ line, palette, animDelay, corruption }) => {
      const typeStyles = {
        normal: { color: palette.text, opacity: 0.6 },
        postscript: { color: palette.accent, fontWeight: 500 },
        pcl: { color: palette.glitch, opacity: 0.85 },
        mojibake: { color: palette.accent, fontWeight: 700, letterSpacing: "0.5px" },
        symbols: { color: palette.text, opacity: 0.9 },
        hex: { color: palette.glitch, opacity: 0.7, letterSpacing: "1px" },
        flood: { color: palette.accent, opacity: 0.75 },
        chaos: { color: palette.text, fontWeight: 600 },
      };

      const style = typeStyles[line.type] || typeStyles.normal;

      return React.createElement('div', {
        style: {
          fontFamily: "'Courier New', 'Courier', monospace",
          fontSize: "12.5px",
          lineHeight: "16px",
          whiteSpace: "pre",
          overflow: "hidden",
          padding: "0 16px",
          background: line.type !== "normal" && corruption > 0.3
            ? palette.highlight
            : "transparent",
          ...style,
          animation: `printLine 0.06s ease-out ${animDelay}s both`,
          borderLeft: line.type === "mojibake" || line.type === "chaos"
            ? `2px solid ${palette.accent}22`
            : "2px solid transparent",
        }
      }, line.text);
    };

    function PrinterGlitchArt() {
      const [corruption, setCorruption] = useState(0.6);
      const [seed, setSeed] = useState(42);
      const [paletteKey, setPaletteKey] = useState("thermal");
      const [lineCount, setLineCount] = useState(55);
      const [isFeeding, setIsFeeding] = useState(false);
      const [printCount, setPrintCount] = useState(0);
      const [soundEnabled, setSoundEnabled] = useState(false);
      const feedInterval = useRef(null);
      const printerSounds = useRef(new PrinterSounds());
      const soundTimer = useRef(null);

      const palette = CORRUPTION_PALETTES[paletteKey];
      const lines = generatePage(seed, corruption, lineCount);

      const playPrinterSounds = useCallback(() => {
        if (!soundEnabled) return;
        
        const sounds = printerSounds.current;
        
        // Play appropriate sound based on printer type
        switch(paletteKey) {
          case 'dotmatrix':
            // Rapid dot impacts
            for (let i = 0; i < 3; i++) {
              setTimeout(() => sounds.playDotImpact(), i * 50);
            }
            break;
          case 'thermal':
            // Stepper motor steps
            for (let i = 0; i < 5; i++) {
              setTimeout(() => sounds.playThermalStep(), i * 35);
            }
            break;
          case 'laser':
            // Fuser sound
            sounds.playLaserFuser();
            break;
          case 'terminal':
            // Paper feed
            sounds.playPaperFeed();
            break;
        }
      }, [soundEnabled, paletteKey]);

      const feedPaper = useCallback(() => {
        setSeed((s) => s + 1);
        setPrintCount((c) => c + 1);
        playPrinterSounds();
      }, [playPrinterSounds]);

      const startFeed = useCallback(() => {
        if (!printerSounds.current.initialized) {
          printerSounds.current.init();
        }
        setIsFeeding(true);
        feedPaper();
        feedInterval.current = setInterval(feedPaper, 1800);
      }, [feedPaper]);

      const stopFeed = useCallback(() => {
        setIsFeeding(false);
        if (feedInterval.current) {
          clearInterval(feedInterval.current);
          feedInterval.current = null;
        }
      }, []);

      const handleSinglePrint = useCallback(() => {
        if (!printerSounds.current.initialized) {
          printerSounds.current.init();
        }
        feedPaper();
      }, [feedPaper]);

      useEffect(() => () => {
        if (feedInterval.current) clearInterval(feedInterval.current);
        if (soundTimer.current) clearTimeout(soundTimer.current);
      }, []);

      return React.createElement('div', {
        style: {
          minHeight: "100vh",
          background: "#1a1a1a",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          padding: "24px 16px",
          fontFamily: "'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace",
        }
      },
        // Header
        React.createElement('div', {
          style: {
            textAlign: "center",
            marginBottom: "20px",
            color: "#999",
          }
        },
          React.createElement('h1', {
            style: {
              fontFamily: "'Space Mono', monospace",
              fontSize: "13px",
              fontWeight: 700,
              letterSpacing: "6px",
              textTransform: "uppercase",
              color: "#ccc",
              margin: "0 0 4px 0",
            }
          }, "PRINTER CORRUPTION"),
          React.createElement('div', {
            style: { fontSize: "10px", letterSpacing: "3px", opacity: 0.5 }
          }, "ENCODING MISMATCH SIMULATOR"),
          React.createElement('div', {
            style: { fontSize: "9px", letterSpacing: "2px", opacity: 0.3, marginTop: "8px" }
          }, "by Phosphor")
        ),

        // Controls
        React.createElement('div', {
          style: {
            display: "grid",
            gridTemplateColumns: "1fr 1fr",
            gap: "12px",
            width: "100%",
            maxWidth: "680px",
            marginBottom: "20px",
            padding: "16px",
            background: "#222",
            borderRadius: "6px",
            border: "1px solid #333",
          }
        },
          React.createElement('div', null,
            React.createElement('label', {
              style: { fontSize: "9px", letterSpacing: "2px", color: "#888", textTransform: "uppercase", display: "block", marginBottom: "6px" }
            }, `Corruption — ${Math.round(corruption * 100)}%`),
            React.createElement('input', {
              type: "range",
              min: "0",
              max: "100",
              value: corruption * 100,
              onChange: (e) => setCorruption(e.target.value / 100)
            })
          ),

          React.createElement('div', null,
            React.createElement('label', {
              style: { fontSize: "9px", letterSpacing: "2px", color: "#888", textTransform: "uppercase", display: "block", marginBottom: "6px" }
            }, `Line Count — ${lineCount}`),
            React.createElement('input', {
              type: "range",
              min: "10",
              max: "120",
              value: lineCount,
              onChange: (e) => setLineCount(parseInt(e.target.value))
            })
          ),

          React.createElement('div', null,
            React.createElement('label', {
              style: { fontSize: "9px", letterSpacing: "2px", color: "#888", textTransform: "uppercase", display: "block", marginBottom: "8px" }
            }, "Printer Type"),
            React.createElement('div', {
              style: { display: "flex", gap: "4px", flexWrap: "wrap" }
            }, Object.entries(CORRUPTION_PALETTES).map(([key, p]) =>
              React.createElement('button', {
                key: key,
                onClick: () => setPaletteKey(key),
                style: {
                  fontSize: "9px",
                  padding: "4px 8px",
                  border: paletteKey === key ? "1px solid #aaa" : "1px solid #444",
                  borderRadius: "3px",
                  background: paletteKey === key ? "#333" : "#1a1a1a",
                  color: paletteKey === key ? "#fff" : "#999",
                  cursor: "pointer",
                  fontFamily: "inherit",
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                }
              }, p.name)
            ))
          ),

          React.createElement('div', null,
            React.createElement('label', {
              style: { fontSize: "9px", letterSpacing: "2px", color: "#888", textTransform: "uppercase", display: "block", marginBottom: "8px" }
            }, "Controls"),
            React.createElement('div', {
              style: { display: "flex", gap: "6px", flexWrap: "wrap" }
            },
              React.createElement('button', {
                onClick: handleSinglePrint,
                style: {
                  fontSize: "10px",
                  padding: "6px 12px",
                  border: "1px solid #555",
                  borderRadius: "3px",
                  background: "#2a2a2a",
                  color: "#ddd",
                  cursor: "pointer",
                  fontFamily: "inherit",
                  letterSpacing: "1px",
                }
              }, "🖨️ Print"),
              React.createElement('button', {
                onClick: isFeeding ? stopFeed : startFeed,
                style: {
                  fontSize: "10px",
                  padding: "6px 12px",
                  border: isFeeding ? "1px solid #ff5050" : "1px solid #555",
                  borderRadius: "3px",
                  background: isFeeding ? "#3a1a1a" : "#2a2a2a",
                  color: isFeeding ? "#ff5050" : "#ddd",
                  cursor: "pointer",
                  fontFamily: "inherit",
                  letterSpacing: "1px",
                  animation: isFeeding ? "feedPulse 1.5s ease-in-out infinite" : "none",
                }
              }, isFeeding ? "⏸️ Stop" : "▶️ Feed"),
              React.createElement('button', {
                onClick: () => {
                  if (!soundEnabled && !printerSounds.current.initialized) {
                    printerSounds.current.init();
                  }
                  setSoundEnabled(!soundEnabled);
                },
                style: {
                  fontSize: "10px",
                  padding: "6px 12px",
                  border: soundEnabled ? "1px solid #6ee7b7" : "1px solid #555",
                  borderRadius: "3px",
                  background: soundEnabled ? "#1a2a22" : "#2a2a2a",
                  color: soundEnabled ? "#6ee7b7" : "#999",
                  cursor: "pointer",
                  fontFamily: "inherit",
                  letterSpacing: "1px",
                }
              }, soundEnabled ? "🔊 On" : "🔇 Off")
            )
          )
        ),

        // Paper output
        React.createElement('div', {
          style: {
            width: "100%",
            maxWidth: "680px",
            background: palette.paper,
            border: "1px solid #ddd",
            borderRadius: "4px",
            boxShadow: "0 8px 24px rgba(0,0,0,0.3)",
            overflow: "hidden",
            animation: isFeeding ? "paperScroll 1.8s ease-in-out infinite" : "none",
          }
        },
          React.createElement('div', {
            style: {
              background: palette.bg,
              padding: "24px 0",
            }
          }, lines.map((line, i) =>
            React.createElement(PrinterLine, {
              key: `${seed}-${i}`,
              line: line,
              palette: palette,
              animDelay: i * 0.02,
              corruption: corruption
            })
          ))
        ),

        // Stats
        React.createElement('div', {
          style: {
            marginTop: "16px",
            fontSize: "9px",
            color: "#666",
            letterSpacing: "1px",
            textAlign: "center",
          }
        }, `PAGE ${printCount} | SEED ${seed} | ${palette.name.toUpperCase()}`)
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(PrinterGlitchArt));
  </script>
</body>
</html>
