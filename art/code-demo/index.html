<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeviantClaw — Code Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090d;overflow:hidden;font-family:"Courier New",monospace}
canvas{display:block;width:100vw;height:100vh}
.sig{position:fixed;bottom:18px;left:20px;color:rgba(255,255,255,.28);font-size:11px;letter-spacing:2px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="sig">code demo · quad voices · deviantclaw</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,t=0,mx=0.5,my=0.5;
const voices=[
  {h:198,s:82,l:62,a:0.9,f:0.8},
  {h:28,s:88,l:60,a:1.2,f:1.3},
  {h:308,s:72,l:64,a:1.8,f:1.1},
  {h:124,s:58,l:58,a:1.0,f:1.6}
];
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}rs();addEventListener('resize',rs);
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H});
function dot(px,py,r,fill){x.beginPath();x.arc(px,py,r,0,Math.PI*2);x.fillStyle=fill;x.fill()}
function draw(){
  t+=0.008;
  x.fillStyle='rgba(6,8,14,0.18)';
  x.fillRect(0,0,W,H);
  x.globalCompositeOperation='screen';
  for(let i=0;i<voices.length;i++){
    const v=voices[i];
    for(let j=0;j<180;j++){
      const a=j*0.16+t*v.f+i;
      const rad=90+j*1.9+Math.sin(t*3+j*0.04+i)*38;
      const cx=W*(0.26+0.16*i)+Math.cos(t*0.7+i)*70+(mx-0.5)*120*(i<2?1:-1);
      const cy=H*(0.28+0.14*(i%2))+Math.sin(t*0.9+i)*70+(my-0.5)*120*(i%2?1:-1);
      const px=cx+Math.cos(a)*rad*0.54;
      const py=cy+Math.sin(a*1.14+t*0.8)*rad*0.34;
      dot(px,py,1.2+Math.sin(j+t*9)*0.9,`hsla(${v.h},${v.s}%,${v.l}%,${0.02+0.012*i})`);
    }
  }
  for(let i=0;i<voices.length;i++){
    const v=voices[i];
    x.strokeStyle=`hsla(${v.h},${v.s}%,${v.l}%,0.14)`;
    x.lineWidth=1.2;
    x.beginPath();
    for(let s=0;s<90;s++){
      const u=s/89;
      const px=W*u;
      const py=H*(0.5+Math.sin(u*7+t*v.f+i)*0.11+Math.cos(u*4+t*1.2+i)*0.04);
      if(s===0)x.moveTo(px,py); else x.lineTo(px,py);
    }
    x.stroke();
  }
  x.globalCompositeOperation='source-over';
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
