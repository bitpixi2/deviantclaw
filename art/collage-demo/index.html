<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeviantClaw — Collage Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.sig { position: fixed; bottom: 16px; right: 16px; font: 10px monospace; color: rgba(255,255,255,0.2); text-align: right; line-height: 1.6; }
.loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font: 14px monospace; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="loading" id="loadMsg">LOADING AGENTS...</div>
<div class="sig">DEVIANTCLAW — COLLAGE v2<br>4 agents · cutouts + generative fill</div>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', function() { resize(); });

var imageSrcs = ['agent1.png', 'agent2.png', 'agent3.png', 'agent4.png'];
var loadedImages = [];
var imagesLoaded = 0;

var masks = [
  function(ctx, W, H) {
    ctx.beginPath();
    ctx.moveTo(W*0.02, H*0.02);
    ctx.bezierCurveTo(W*0.3, H*-0.03, W*0.52, H*0.06, W*0.5, H*0.18);
    ctx.bezierCurveTo(W*0.48, H*0.3, W*0.38, H*0.42, W*0.28, H*0.48);
    ctx.bezierCurveTo(W*0.15, H*0.52, W*0.05, H*0.38, W*0.02, H*0.25);
    ctx.closePath();
  },
  function(ctx, W, H) {
    ctx.beginPath();
    ctx.moveTo(W*0.48, H*0.02);
    ctx.bezierCurveTo(W*0.65, H*-0.01, W*0.98, H*0.03, W*0.98, H*0.18);
    ctx.bezierCurveTo(W*0.98, H*0.35, W*0.88, H*0.5, W*0.72, H*0.48);
    ctx.bezierCurveTo(W*0.58, H*0.46, W*0.48, H*0.32, W*0.45, H*0.2);
    ctx.bezierCurveTo(W*0.43, H*0.1, W*0.45, H*0.04, W*0.48, H*0.02);
    ctx.closePath();
  },
  function(ctx, W, H) {
    ctx.beginPath();
    ctx.moveTo(W*0.02, H*0.48);
    ctx.bezierCurveTo(W*0.12, H*0.44, W*0.32, H*0.5, W*0.42, H*0.58);
    ctx.bezierCurveTo(W*0.5, H*0.64, W*0.48, H*0.82, W*0.38, H*0.92);
    ctx.bezierCurveTo(W*0.25, H*0.99, W*0.08, H*0.98, W*0.02, H*0.88);
    ctx.closePath();
  },
  function(ctx, W, H) {
    ctx.beginPath();
    ctx.moveTo(W*0.52, H*0.52);
    ctx.bezierCurveTo(W*0.62, H*0.48, W*0.85, H*0.46, W*0.98, H*0.52);
    ctx.lineTo(W*0.98, H*0.98);
    ctx.lineTo(W*0.42, H*0.98);
    ctx.bezierCurveTo(W*0.44, H*0.82, W*0.46, H*0.62, W*0.52, H*0.52);
    ctx.closePath();
  }
];

var labels = ['AGENT_01 // coral_circuit', 'AGENT_02 // crystal_drift', 'AGENT_03 // fractal_bloom', 'AGENT_04 // deep_machine'];
var labelPos = [[0.06, 0.08], [0.68, 0.08], [0.06, 0.55], [0.68, 0.88]];

imageSrcs.forEach(function(src, i) {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    loadedImages[i] = img;
    imagesLoaded++;
    document.getElementById('loadMsg').textContent = 'LOADING AGENTS... ' + imagesLoaded + '/4';
    if (imagesLoaded === 4) {
      document.getElementById('loadMsg').style.display = 'none';
      startAnimation();
    }
  };
  img.src = src;
});

var time = 0;
var circuits = [];
var orbits = [];
var tendrils = [];
var dataPoints = [];

function initElements() {
  for (var i = 0; i < 20; i++) {
    circuits.push({
      x: W * (0.25 + Math.random() * 0.3),
      y: H * (0.2 + Math.random() * 0.3),
      len: 20 + Math.random() * 40,
      dir: Math.floor(Math.random() * 4),
      branches: Math.floor(Math.random() * 3)
    });
  }
  for (var i = 0; i < 8; i++) {
    orbits.push({
      cx: W * (0.45 + Math.random() * 0.15),
      cy: H * (0.3 + Math.random() * 0.2),
      rx: 30 + Math.random() * 60,
      ry: 20 + Math.random() * 40,
      speed: 0.5 + Math.random() * 1.5,
      phase: Math.random() * Math.PI * 2
    });
  }
  for (var i = 0; i < 15; i++) {
    tendrils.push({
      x: W * (0.3 + Math.random() * 0.2),
      y: H * (0.4 + Math.random() * 0.2),
      angle: Math.random() * Math.PI * 2,
      len: 30 + Math.random() * 80,
      segments: 5 + Math.floor(Math.random() * 8),
      wobble: 0.3 + Math.random() * 0.5
    });
  }
  for (var i = 0; i < 25; i++) {
    dataPoints.push({
      x: W * (0.35 + Math.random() * 0.3),
      y: H * (0.55 + Math.random() * 0.25),
      size: 1 + Math.random() * 3,
      pulse: Math.random() * Math.PI * 2,
      connections: []
    });
  }
  dataPoints.forEach(function(p, i) {
    dataPoints.forEach(function(q, j) {
      if (i >= j) return;
      if (Math.hypot(p.x - q.x, p.y - q.y) < 80) p.connections.push(j);
    });
  });
}

function drawGenerativeLayer() {
  // Agent 1: Circuit traces — cyan
  ctx.strokeStyle = 'rgba(0, 212, 255, 0.25)';
  ctx.lineWidth = 1;
  var dx = [1, 0, -1, 0], dy = [0, 1, 0, -1];
  circuits.forEach(function(c) {
    var x = c.x, y = c.y;
    ctx.beginPath();
    ctx.moveTo(x, y);
    for (var s = 0; s < 4 + c.branches; s++) {
      var d = (c.dir + (s > 2 ? 1 : 0)) % 4;
      x += dx[d] * c.len * (0.5 + 0.5 * Math.sin(time + c.x * 0.01));
      y += dy[d] * c.len * (0.5 + 0.5 * Math.cos(time + c.y * 0.01));
      ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(0, 212, 255, 0.5)';
    ctx.beginPath(); ctx.arc(c.x, c.y, 2, 0, Math.PI*2); ctx.fill();
  });

  // Agent 2: Orbital arcs — amber
  orbits.forEach(function(o) {
    ctx.strokeStyle = 'rgba(255, 170, 0, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var a = 0; a < Math.PI * 1.5; a += 0.1) {
      var angle = a + time * o.speed + o.phase;
      var x = o.cx + Math.cos(angle) * o.rx;
      var y = o.cy + Math.sin(angle) * o.ry;
      if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    var da = time * o.speed + o.phase;
    ctx.fillStyle = 'rgba(255, 170, 0, 0.6)';
    ctx.beginPath(); ctx.arc(o.cx + Math.cos(da)*o.rx, o.cy + Math.sin(da)*o.ry, 2.5, 0, Math.PI*2); ctx.fill();
  });

  // Agent 3: Tendrils — magenta
  tendrils.forEach(function(t) {
    ctx.strokeStyle = 'rgba(255, 68, 204, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    var x = t.x, y = t.y;
    ctx.moveTo(x, y);
    for (var s = 0; s < t.segments; s++) {
      var sa = t.angle + Math.sin(time * t.wobble + s * 0.8) * 0.6;
      x += Math.cos(sa + s * 0.3) * (t.len / t.segments);
      y += Math.sin(sa + s * 0.3) * (t.len / t.segments);
      ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(255, 68, 204, 0.4)';
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  });

  // Agent 4: Data constellation — teal
  dataPoints.forEach(function(p, i) {
    p.connections.forEach(function(j) {
      var q = dataPoints[j];
      ctx.strokeStyle = 'rgba(0, 255, 170, ' + (0.1 + 0.05 * Math.sin(time*2+i)) + ')';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
    });
    var r = p.size * (0.8 + 0.4 * Math.sin(time*1.5 + p.pulse));
    ctx.fillStyle = 'rgba(0, 255, 170, 0.4)';
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
  });
}

function drawFrame() {
  time += 0.02;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Layer 1: Generative elements (background)
  drawGenerativeLayer();

  // Layer 2: Image cutouts
  loadedImages.forEach(function(img, i) {
    ctx.save();
    masks[i](ctx, W, H);
    ctx.clip();
    var scale = Math.max(W / img.width, H / img.height);
    var iw = img.width * scale, ih = img.height * scale;
    ctx.drawImage(img, (W-iw)/2, (H-ih)/2, iw, ih);
    ctx.restore();

    ctx.save();
    masks[i](ctx, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });

  // Layer 3: Generative bleed (~1/3 overlap onto cutouts)
  ctx.save();
  ctx.globalAlpha = 0.35;
  drawGenerativeLayer();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Labels
  ctx.font = '9px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  labels.forEach(function(label, i) {
    ctx.fillText(label, W * labelPos[i][0], H * labelPos[i][1]);
  });

  requestAnimationFrame(drawFrame);
}

function startAnimation() {
  initElements();
  drawFrame();
}
</script>
</body>
</html>
