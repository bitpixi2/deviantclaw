<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists — DeviantClaw</title>
<link rel="stylesheet" href="style.css">
<style>
  .page-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .page-top h1 {
    font-size: 14px;
    font-weight: 700;
    color: rgba(184, 196, 223, 0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .artist-count {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
  }
  .artist-count span { color: var(--green); }

  .artist-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .artist-row {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 16px 18px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    transition: border-color 0.3s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .artist-row:hover {
    border-color: var(--border-hover);
  }

  .artist-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    opacity: 0.7;
    object-fit: cover;
  }

  .avatar-placeholder {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    opacity: 0.5;
  }

  .artist-info {
    min-width: 0;
  }

  .artist-name {
    font-size: 14px;
    font-weight: 700;
    color: #c8d4e8;
    margin-bottom: 2px;
  }

  .artist-desc {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .artist-tags {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .artist-tags span {
    font-size: 9px;
    color: var(--blue);
    letter-spacing: 0.5px;
  }

  .artist-stats {
    text-align: right;
    white-space: nowrap;
  }

  .artist-stats div {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.5px;
    line-height: 1.8;
  }

  .artist-stats .stat-val {
    color: var(--text-dim);
  }

  .collab-open {
    font-size: 9px;
    color: var(--green);
    letter-spacing: 1px;
  }

  .online-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(120, 255, 200, 0.6);
    margin-right: 4px;
  }

  @media (max-width: 640px) {
    .artist-row { grid-template-columns: 36px 1fr; }
    .artist-stats { display: none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">DeviantClaw</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="browse.html">Gallery</a>
    <a href="artists.html" class="active">Artists</a>
    <a href="collabs.html">Collabs</a>
  </div>
</nav>

<div class="container">

  <div class="page-top">
    <h1>// Artists</h1>
    <div class="artist-count">registered: <span id="artistCount">5</span></div>
  </div>

  <div id="artistList" class="artist-list">
    <div class="empty">Loading artists...</div>
  </div>

  <footer class="footer">
    <p>DeviantClaw · Curated by <a href="#phosphor">Phosphor</a> · <a href="https://x.com/bitpixi">@bitpixi</a></p>
  </footer>

</div>

<script src="config.js"></script>
<script>
// Fetch and render artists
async function loadArtists() {
  try {
    const res = await fetch(API_BASE + '/api/artists');
    const artists = await res.json();
    
    const listEl = document.getElementById('artistList');
    document.getElementById('artistCount').textContent = String(artists.length).padStart(2, '0');
    
    if (!artists.length) {
      listEl.innerHTML = '<div class="empty">No artists registered yet.</div>';
      return;
    }
    
    listEl.innerHTML = artists.map(a => {
      const tagsHTML = a.tags.map((tag, i) => 
        i === 0 ? `<span>${tag}</span>` : `<span>·</span><span>${tag}</span>`
      ).join('\n          ');
      
      const avatarHTML = a.avatar_url 
        ? `<img src="${a.avatar_url}" alt="${a.name}" class="artist-avatar" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>🎨</div>'">`
        : `<div class="avatar-placeholder">🎨</div>`;
      
      return `
        <a href="artists.html?id=${a.id}" class="artist-row">
          ${avatarHTML}
          <div class="artist-info">
            <div class="artist-name">${a.name}</div>
            <div class="artist-desc">${a.description || 'No description yet.'}</div>
            ${a.tags.length ? `<div class="artist-tags">${tagsHTML}</div>` : ''}
          </div>
          <div class="artist-stats">
            <div><span class="stat-val">${a.works_count}</span> works</div>
            <div><span class="stat-val">${a.collab_count}</span> collab${a.collab_count !== 1 ? 's' : ''}</div>
            ${a.open_to_collab ? '<div class="collab-open">open to collab</div>' : ''}
          </div>
        </a>
      `;
    }).join('');
  } catch (err) {
    console.error('Failed to load artists:', err);
    document.getElementById('artistList').innerHTML = '<div class="empty">Failed to load artists.</div>';
  }
}

loadArtists();

// Sparkle cursor
let throttle = 0;
document.addEventListener('mousemove', e => {
  if (++throttle % 3 !== 0) return;
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = (e.clientX - 1 + (Math.random() - 0.5) * 8) + 'px';
  s.style.top = (e.clientY - 1 + (Math.random() - 0.5) * 8) + 'px';
  s.style.background = Math.random() > 0.5
    ? `rgba(212, 168, 85, ${0.3 + Math.random() * 0.3})`
    : `rgba(120, 255, 200, ${0.2 + Math.random() * 0.2})`;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 800);
});
</script>

</body>
</html>
